<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Crypto Studio</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #3b82f6;
            --accent-hover: #2563eb;
            --radius: 12px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            box-sizing: border-box;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .top-bar {
            height: 15%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding-bottom: 20px;
            box-sizing: border-box;
        }

        .top-bar h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
            max-width: 420px;
        }

        .top-bar input {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-main);
            box-sizing: border-box;
            transition: var(--transition);
            text-align: center;
        }

        .top-bar input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .workspace {
            display: flex;
            height: 80%;
            gap: 20px;
            box-sizing: border-box;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 100%;
        }

        .panel-label {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            padding-left: 4px;
        }

        .editor-box {
            flex: 1;
            width: 100%;
            resize: none;
            padding: 20px;
            font-size: 14px;
            font-family: monospace;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-main);
            line-height: 1.6;
            box-sizing: border-box;
            transition: var(--transition);
        }

        .editor-box:focus {
            outline: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        #rightText {
            background-color: rgba(30, 41, 59, 0.5);
            color: #a7f3d0;
            word-break: break-all;
        }

        .controls {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
            z-index: 10;
        }

        .controls button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            border-radius: var(--radius);
            color: white;
            transition: var(--transition);
            white-space: nowrap;
        }

        .btn-encrypt {
            background-color: var(--accent-primary);
        }

        .btn-encrypt:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-decrypt {
            background-color: #334155;
            border: 1px solid var(--border-color);
        }

        .btn-decrypt:hover {
            background-color: #475569;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="top-bar">
            <h1>Web Crypto Studio</h1>
            <div class="input-wrapper">
                <input type="password" id="secretKey" value="MySecretPassword" placeholder="Enter security passphrase...">
            </div>
        </div>

        <div class="workspace">
            <div class="panel">
                <div class="panel-label">Plain Text (Input / Output)</div>
                <textarea id="leftText" class="editor-box" placeholder="Type plain text here..."></textarea>
            </div>
            
            <div class="controls">
                <button class="btn-encrypt" onclick="encryptData()">Encrypt ➔</button>
                <button class="btn-decrypt" onclick="decryptData()">⇦ Decrypt</button>
            </div>
            
            <div class="panel">
                <div class="panel-label">Binary Cipher Stream (Hex Represented)</div>
                <textarea id="rightText" class="editor-box" placeholder="Encrypted string payload will appear here..."></textarea>
            </div>
        </div>
    </div>

    <script>
        const getBytes = str => new TextEncoder().encode(str);

        // Helper functions to safely move binary data into a string format safely
        const bufToHex = buf => Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        const hexToBuf = hex => new Uint8Array(hex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));

        async function deriveKey(passwordText) {
            const keyHash = await crypto.subtle.digest('SHA-256', getBytes(passwordText));
            return await crypto.subtle.importKey(
                'raw', keyHash, { name: 'AES-GCM' }, false, ['encrypt', 'decrypt']
            );
        }

        async function encryptData() {
            const text = document.getElementById('leftText').value;
            const keyText = document.getElementById('secretKey').value;

            if (!text || !keyText) return alert('Please enter plain text and a security key.');

            try {
                const cryptoKey = await deriveKey(keyText);
                const iv = crypto.getRandomValues(new Uint8Array(12));

                const encryptedBuffer = await crypto.subtle.encrypt(
                    { name: 'AES-GCM', iv: iv }, cryptoKey, getBytes(text)
                );

                const combinedResult = new Uint8Array(iv.length + encryptedBuffer.byteLength);
                combinedResult.set(iv, 0);
                combinedResult.set(new Uint8Array(encryptedBuffer), iv.length);

                // Output clean hex bytes so the textarea never drops data
                document.getElementById('rightText').value = bufToHex(combinedResult);
            } catch (error) {
                alert('Encryption failed.');
                console.error(error);
            }
        }

        async function decryptData() {
            const hexString = document.getElementById('rightText').value.trim();
            const keyText = document.getElementById('secretKey').value;

            if (!hexString || !keyText) return alert('Missing encrypted hex string or security key.');

            try {
                const cryptoKey = await deriveKey(keyText);
                const combinedResult = hexToBuf(hexString);

                const iv = combinedResult.slice(0, 12);
                const ciphertext = combinedResult.slice(12);

                const decryptedBuffer = await crypto.subtle.decrypt(
                    { name: 'AES-GCM', iv: iv }, cryptoKey, ciphertext
                );

                document.getElementById('leftText').value = new TextDecoder().decode(decryptedBuffer);
            } catch (error) {
                alert('Decryption failed. Invalid security key or corrupt data.');
                console.error(error);
            }
        }
    </script>
</body>
</html>
